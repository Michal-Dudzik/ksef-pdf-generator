# KSeF PDF Generator configuration
# This file can be placed next to the .exe or in the current working directory.

[numberFormat]
# Use integer >= 0 for fixed decimals (e.g. 2, 3, 4)
# Use null for legacy unlimited behavior
# Missing or invalid value falls back to default: 2
decimals = 2

[currencyFormat]
# Use true to insert non-breaking thousands separators, e.g. 10 000 000,00
# Use false to keep the current formatting
thousands_separator = false
